name: Automation Exercise CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Playwright Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgbm-dev

      - name: Run Tests
        run: mvn clean test -Dheadless=true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Send email on completion
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "GitHub Actions Status: ${{ job.status }}"
          body: "The test run has finished with status: ${{ job.status }}. Please check the GitHub Actions tab for details."
          to: mekko.hassan@gmail.com
          from: GitHub Actions